---
# roles/multicred_login/tasks/main.yml
#
# For every host in play, attempt login using the credential list and
# protocol list defined in group_vars/all.yml (or overridden per-host/group).
# On the first working credential/protocol, the module pulls the running
# config and returns the device's PUBLIC interface IP addresses (with mask,
# interface and calculated subnet ID).
#
# Aggregation note: Ansible runs hosts in parallel forks by default, and
# facts set with set_fact are NOT reliably shared/merged across hosts that
# ran in different forks. Rather than fight that, each host writes its own
# small JSON result file to a local scratch directory (delegate_to:
# localhost, one file per host -> no write contention). A final task
# (in site.yml, run_once on localhost, after this role) reads all the
# JSON fragments and writes the single combined CSV.

- name: Attempt multi-credential / multi-protocol login on {{ inventory_hostname }}
  multicred_connect:
    host: "{{ ansible_host | default(inventory_hostname) }}"
    port: "{{ device_port | default(omit) }}"
    device_type: "{{ device_platform | default('cisco_ios') }}"
    protocols: "{{ login_protocols }}"
    credentials: "{{ credential_list }}"
    interface_command: "{{ interface_command }}"
    timeout: "{{ login_timeout | default(15) }}"
  delegate_to: localhost
  register: login_result
  # Never let a single device's failure stop the whole play; we want to
  # account for every device, success or fail.
  ignore_errors: true

- name: Build result record for {{ inventory_hostname }}
  set_fact:
    device_result:
      device_name: "{{ inventory_hostname }}"
      management_ip: "{{ ansible_host | default(inventory_hostname) }}"
      status: "{{ login_result.status | default('fail') }}"
      credential_used: "{{ login_result.credential_used | default('') }}"
      protocol_used: "{{ login_result.protocol_used | default('') }}"
      attempts: "{{ login_result.attempts | default(0) }}"
      public_ips: "{{ login_result.public_ips | default([]) }}"
      last_error: >-
        {%- if login_result.status | default('fail') == 'success' -%}
        {{ '' }}
        {%- else -%}
        {{ login_result.last_error | default('module_error: ' ~ (login_result.msg | default('unknown')), true) }}
        {%- endif -%}
      timestamp: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Show result for {{ inventory_hostname }}
  debug:
    msg: >-
      [{{ device_result.status | upper }}] {{ device_result.device_name }}
      cred={{ device_result.credential_used }}
      proto={{ device_result.protocol_used }}
      public_ips={{ device_result.public_ips | length }}
      {{ '' if device_result.status == 'success' else 'error=' ~ device_result.last_error }}

- name: Ensure local results-fragments directory exists
  delegate_to: localhost
  file:
    path: "{{ results_fragments_dir }}"
    state: directory
    mode: "0750"
  run_once: false

- name: Write this host's result fragment to disk
  delegate_to: localhost
  copy:
    content: "{{ device_result | to_nice_json }}"
    dest: "{{ results_fragments_dir }}/{{ inventory_hostname }}.json"
    mode: "0640"
