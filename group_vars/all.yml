---
# group_vars/all.yml
#
# Global defaults applied to every host in the play. Per-host overrides
# (e.g. login_protocols set on a single inventory host) take precedence
# over these.
#
# NOTE: files/secrets.yml and files/credentials.yml are loaded directly
# by site.yml via vars_files (relative to the playbook directory), so
# they are not referenced here.

# Order matters: tried top-to-bottom, first success wins.
login_protocols:
  - telnet
  - ssh

# Command used to retrieve the interface IP configuration once logged in.
# Its output is parsed for "ip address" lines (dotted-mask on
# IOS/IOS-XE/ASA/XR, CIDR on NX-OS), so any command that emits the
# interface config in that form works. Override with
# -e interface_command="..." at runtime if needed (e.g. a scoped
# "show running-config interface" for read-only accounts).
interface_command: "show running-config"

# Per-attempt connection timeout, seconds.
login_timeout: 15
