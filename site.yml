---
# site.yml
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml site.yml
#
# Optional overrides:
#   ansible-playbook -i inventory/hosts.yml site.yml \
#       -e interface_command="show running-config" \
#       -e batch_size=5
#
# Requires on the controller:
#   pip install netmiko paramiko ansible
#
# What it does:
#   1. For every host in inventory, tries each credential (in order) from
#      credential_list, and for each credential tries each protocol (in
#      order) from login_protocols (default: telnet then ssh).
#   2. Stops at the first successful combination per device, then reads the
#      running config and extracts the device's PUBLIC interface IP
#      addresses (mask, interface, and calculated subnet ID).
#   3. Writes one JSON fragment per host to a scratch dir (avoids
#      parallel-fork fact-aggregation issues).
#   4. A final localhost play merges the fragments into one CSV report with
#      a row per public IP, skipping devices that have no public IP.

- name: Inspect interface IPs and collect public addresses across network devices
  hosts: network_devices
  gather_facts: false
  strategy: free          # let fast/slow devices proceed independently
  serial: "{{ batch_size | default(20) }}"   # throttle concurrent device attempts
  vars:
    results_fragments_dir: "{{ playbook_dir }}/output/.fragments"
  vars_files:
    - files/secrets.yml       # decrypts via --ask-vault-pass / --vault-password-file
    - files/credentials.yml
  roles:
    - multicred_login

- name: Compile final public-IP CSV report
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    results_fragments_dir: "{{ playbook_dir }}/output/.fragments"
    csv_output_path: "{{ playbook_dir }}/output/public_ip_inventory.csv"
  tasks:
    - name: Find all per-host result fragments
      find:
        paths: "{{ results_fragments_dir }}"
        patterns: "*.json"
      register: fragment_files

    - name: Fail loudly if no fragments were produced
      fail:
        msg: >-
          No result fragments found in {{ results_fragments_dir }}.
          Check that the network_devices group in inventory is not empty
          and that the multicred_login role actually ran.
      when: fragment_files.files | length == 0

    - name: Load every fragment's content
      slurp:
        src: "{{ item.path }}"
      register: fragment_contents
      loop: "{{ fragment_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Parse fragments into a single list of result dicts
      set_fact:
        compiled_results: >-
          {{
            fragment_contents.results
            | map(attribute='content')
            | map('b64decode')
            | map('from_json')
            | list
          }}

    - name: Sort results by device name for a stable, readable report
      set_fact:
        compiled_results_sorted: "{{ compiled_results | sort(attribute='device_name') }}"

    - name: Flatten to one row per public IP (devices without a public IP are dropped)
      set_fact:
        public_ip_rows: >-
          {{
            compiled_results_sorted
            | selectattr('public_ips', 'defined')
            | rejectattr('public_ips', 'equalto', [])
            | subelements('public_ips')
            | list
          }}

    - name: Write public-IP CSV report
      copy:
        dest: "{{ csv_output_path }}"
        mode: "0640"
        content: |
          device_name,management_ip,public_ip,subnet_mask,interface,subnet_id
          {% for device, addr in public_ip_rows %}
          {{ device.device_name }},{{ device.management_ip }},{{ addr.public_ip }},{{ addr.netmask }},{{ addr.interface }},{{ addr.subnet_id }}
          {% endfor %}

    - name: Summarize outcome
      vars:
        devices_with_public: "{{ compiled_results_sorted | selectattr('public_ips', 'defined') | rejectattr('public_ips', 'equalto', []) | list | length }}"
        login_failures: "{{ compiled_results_sorted | selectattr('status', 'equalto', 'fail') | list | length }}"
      debug:
        msg: >-
          Done. {{ public_ip_rows | length }} public IP(s) across
          {{ devices_with_public }} device(s); {{ login_failures }} device(s)
          could not be logged into.
          CSV written to {{ csv_output_path }}

    - name: Clean up per-host JSON fragments
      file:
        path: "{{ results_fragments_dir }}"
        state: absent
